
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    # If you have a .env or .env.local file you want to use, you can uncomment the line below:
    # env_file:
    #   - .env.local
    restart: unless-stopped
